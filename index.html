<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Moses Achi — Senior Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="description" content="Moses Achi — Senior Software Engineer | Cloud-native systems, AI trading, scalable platforms" />
    <style>html { scroll-behavior: smooth; } body { background: linear-gradient(180deg,#0f172a 0%, #020617 100%); }</style>
  </head>
  <body class="text-slate-200 antialiased">
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      function Nav(){const links=[{name:'About',href:'#about'},{name:'Skills',href:'#skills'},{name:'Experience',href:'#experience'},{name:'Projects',href:'#projects'},{name:'Education',href:'#education'},{name:'Contact',href:'#contact'}];return(<header className="fixed w-full z-30 top-0 bg-transparent"><nav className="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between"><div className="text-xl font-semibold text-white">Moses Achi</div><div className="hidden md:flex gap-6 text-slate-300">{links.map(l=>(<a key={l.href} href={l.href} className="hover:text-white">{l.name}</a>))}</div><div className="md:hidden"><a href="#contact" className="text-sm bg-slate-800 px-3 py-2 rounded">Contact</a></div></nav></header>);}      
      function Hero(){return(<section className="min-h-screen flex items-center" id="home"><div className="max-w-5xl mx-auto px-6 py-28 grid md:grid-cols-2 gap-10"><div className="space-y-6"><div className="text-sm uppercase tracking-wide text-sky-400">Senior Software Engineer</div><h1 className="text-4xl md:text-5xl font-bold">Moses Achi</h1><p className="text-slate-300 leading-relaxed">Senior Software Engineer with 12+ years building resilient, cloud-native platforms across fintech, AI trading, and enterprise SaaS. I design scalable microservices, optimize real-time pipelines, and integrate AI to deliver measurable business outcomes.</p><div className="flex gap-3 items-center"><a href="#projects" className="inline-block bg-sky-500 text-slate-900 px-4 py-2 rounded font-medium">See projects</a><a href="mailto:mosesachi.me@gmail.com" className="inline-block border border-slate-600 px-4 py-2 rounded">mosesachi.me@gmail.com</a></div><div className="flex gap-3 mt-4 text-slate-300"><a href="https://github.com/mosesachizz" target="_blank" rel="noreferrer" className="underline">GitHub</a><a href="https://linkedin.com/in/mosesachi" target="_blank" rel="noreferrer" className="underline">LinkedIn</a></div></div><div className="bg-gradient-to-br from-slate-800/40 to-slate-900/20 p-6 rounded-lg border border-slate-700"><div className="text-slate-300 font-medium">Snapshot</div><ul className="mt-4 space-y-3 text-slate-200"><li>Cloud & Infrastructure: AWS, GCP, Azure, Kubernetes, Terraform</li><li>Backend: Java, Python, Go, Node.js, Spring Boot, Microservices</li><li>Data & AI: Kafka, TensorFlow, PyTorch, PostgreSQL, Redis</li><li>CI/CD & Observability: GitHub Actions, Jenkins, Prometheus, Grafana</li></ul></div></div></section>);}      
      function SectionTitle({children}){return <h2 className="text-2xl font-semibold text-white">{children}</h2>}      
      function Skills(){const groups=[{title:'Cloud & Infra',items:['AWS','GCP','Azure','Kubernetes','Docker','Terraform']},{title:'Backend',items:['Java','Python','Go','Node.js','Spring Boot','Microservices']},{title:'Data & AI',items:['PostgreSQL','MongoDB','Redis','Kafka','TensorFlow','PyTorch']},{title:'Tools',items:['Git','GitHub Actions','Jenkins','Prometheus','Grafana']}];return(<section id="skills" className="max-w-5xl mx-auto px-6 py-16"><SectionTitle>Skills</SectionTitle><div className="mt-6 grid sm:grid-cols-2 md:grid-cols-4 gap-4">{groups.map(g=>(<div key={g.title} className="bg-slate-800/40 p-4 rounded border border-slate-700"><div className="font-semibold text-sky-300 mb-2">{g.title}</div><ul className="text-slate-200 text-sm space-y-1">{g.items.map(i=><li key={i}>• {i}</li>)}</ul></div>))}</div></section>)}
      function ExperienceCard({role,company,period,bullets}){return(<div className="bg-slate-800/30 p-5 rounded border border-slate-700"><div className="flex items-start justify-between"><div><div className="font-semibold text-white">{role}</div><div className="text-sm text-slate-300">{company} • <span className="italic">{period}</span></div></div></div><ul className="mt-3 text-slate-200 list-disc ml-5 space-y-1 text-sm">{bullets.map((b,i)=><li key={i}>{b}</li>)}</ul></div>);}      
      function Experience(){const work=[{role:'Senior Software Engineer',company:'Moonberg AI (Remote)',period:'Nov 2023 - Present',bullets:['Designed AI trading models with TensorFlow & PyTorch that improved trading accuracy by 25%.','Architected cloud-native microservices on AWS with Kubernetes and Docker for fault tolerance and scale.','Built real-time pipelines using Kafka, Redis, PostgreSQL reducing trade execution from 120ms to 35ms.']},{role:'Software Engineer',company:'Binance (Remote)',period:'Apr 2020 - Nov 2023',bullets:['Developed high-throughput engines with Java & Spring Boot supporting billions daily.','Implemented OAuth2/JWT and Kubernetes RBAC for security and compliance.','Built observability with Prometheus, Grafana, ELK reducing incident detection time by 40%.']},{role:'Software Engineer',company:'Adobe Inc. (Singapore)',period:'May 2018 - Apr 2020',bullets:['Engineered SaaS features for Creative Cloud with React, Angular and Node.js.','Migrated apps to microservices on Docker & Kubernetes, cutting release cycles drastically.']},{role:'Co-Founder & Software Engineer',company:'Edutech (Remote / Part-time)',period:'Jun 2013 - Apr 2018',bullets:['Built e-learning platform for 100k+ students with PHP, MySQL, AngularJS on GCP.','Optimized infra with Redis caching and DB tuning for high concurrency.']}];return(<section id="experience" className="max-w-5xl mx-auto px-6 py-16"><SectionTitle>Experience</SectionTitle><div className="mt-6 grid gap-4">{work.map((w,i)=><ExperienceCard key={i} {...w}/>)}</div></section>)}      
      function ProjectCard({title,desc,tech,link}){return(<div className="bg-slate-800/30 p-5 rounded border border-slate-700"><div className="flex items-center justify-between"><div className="font-semibold text-white">{title}</div>{link&&<a href={link} target="_blank" rel="noreferrer" className="text-sm underline">View</a>}</div><div className="text-slate-200 text-sm mt-3">{desc}</div><div className="text-xs text-slate-300 mt-3">{tech}</div></div>);}      
      function Projects(){const projects=[{title:'Distributed AI Trading Engine',desc:'High-frequency trading engine using Python, TensorFlow, Kafka with sub-50ms latency.',tech:'Python • TensorFlow • Kafka • PostgreSQL',link:'#'},{title:'Cloud-Native E-Learning SaaS',desc:'Kubernetes-based multi-tenant learning platform on GCP serving 100k+ users.',tech:'GCP • Kubernetes • PostgreSQL • Redis',link:'#'}];return(<section id="projects" className="max-w-5xl mx-auto px-6 py-16"><SectionTitle>Key Projects</SectionTitle><div className="mt-6 grid md:grid-cols-2 gap-4">{projects.map((p,i)=>(<ProjectCard key={i} {...p}/>))}</div></section>)}      
      function Education(){return(<section id="education" className="max-w-5xl mx-auto px-6 py-16"><SectionTitle>Education</SectionTitle><div className="mt-6 grid md:grid-cols-2 gap-4"><div className="bg-slate-800/30 p-5 rounded border border-slate-700"><div className="font-semibold text-white">Master of Computer Science</div><div className="text-slate-300 text-sm">The University of Sydney — 2018</div><div className="text-slate-200 mt-2">Focus on distributed systems and applied ML.</div></div><div className="bg-slate-800/30 p-5 rounded border border-slate-700"><div className="font-semibold text-white">Bachelor of Engineering, Computer Engineering</div><div className="text-slate-300 text-sm">National University of Singapore — 2016</div><div className="text-slate-200 mt-2">First Class Honours; Best Graduating Student; CGPA: 4.96/5.00</div></div></div></section>)}      
      function Footer(){return(<footer id="contact" className="border-t border-slate-700 mt-10 py-8"><div className="max-w-5xl mx-auto px-6 text-slate-400"><div className="flex flex-col md:flex-row items-center justify-between gap-4"><div><div className="font-semibold text-white">Contact</div><div className="text-sm">mosesachi.me@gmail.com</div></div><div className="text-sm">GitHub: <a href="https://github.com/mosesachizz" target="_blank" rel="noreferrer" className="underline">mosesachizz</a> • LinkedIn: <a href="https://linkedin.com/in/mosesachi" target="_blank" rel="noreferrer" className="underline">mosesachi</a></div></div><div className="mt-4 text-xs text-slate-500">© {new Date().getFullYear()} Moses Achi — Built with React + Tailwind.</div></div></footer>)}      
      function App(){return(<div className="min-h-screen text-slate-100"><Nav/><main className="pt-20"><Hero/><Skills/><Experience/><Projects/><Education/><Footer/></main></div>)}      
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
  </body>
</html>
